<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAVIN TECH SOLUTION</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
    background: #111;
    color: red;
}

/* Main Box */
.container {
    text-align: center;
    margin-top: 50px;
}

/* Input */
input {
    width: 70%;
    padding: 15px;
    font-size: 18px;
    border: none;
    outline: none;
}

/* Button */
button {
    padding: 15px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}

/* Result */
#result {
    margin-top: 30px;
    font-size: 20px;
}

/* Glow */
h1 {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 30px red; }
}
</style>
</head>

<body>

<header>
    <h1>RAVIN TECH SOLUTION</h1>
    <p>Ask any math question 🤖</p>
</header>

<div class="container">
    <input type="text" id="input" placeholder="Enter math problem...">
    <button onclick="solve()">Solve</button>

    <div id="result"></div>
</div>

<script>
function solve() {
    let input = document.getElementById("input").value;

    try {
        let answer = eval(input);
        document.getElementById("result").innerHTML =
            "Answer: " + answer;
    } catch {
        document.getElementById("result").innerHTML =
            "Invalid input!";
    }
}
</script>

</body>
</html>
