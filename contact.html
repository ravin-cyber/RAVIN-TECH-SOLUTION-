<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - RAVIN TECH SOLUTION</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

/* HEADER */
header {
    background: red;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

/* CONTENT */
.container {
    padding: 20px;
}

h1 {
    color: red;
}

/* FORM */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 2px solid red;
    border-radius: 5px;
}

button {
    padding: 10px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
    width: 100%;
}

/* INFO BOX */
.info {
    margin-top: 20px;
    border: 2px solid red;
    padding: 15px;
    border-radius: 10px;
}

/* BACK BUTTON */
.back-btn {
    margin-top: 20px;
    padding: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<header>
    <div>RAVIN TECH SOLUTION</div>
</header>

<div class="container">
    <h1>Contact Us</h1>

    <form onsubmit="sendMessage(); return false;">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="4" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>

    <div class="info">
        <p><b>Phone:</b> 9042458779</p>
        <p><b>Instagram:</b>ravin_tech_official.in</p>
        <p><b>Email:</b> ravintechsolution@gmail.com</p>
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back to Home</button>
</div>

<script>
function sendMessage() {
    alert("Message sent successfully! We will contact you soon.");
}
</script>

</body>
</html>
